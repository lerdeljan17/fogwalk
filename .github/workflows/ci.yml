name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode release keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/fogwalk-release.jks"
            echo "keystore_path=$RUNNER_TEMP/fogwalk-release.jks" >> "$GITHUB_OUTPUT"
            echo "Release keystore decoded."
          else
            echo "No KEYSTORE_BASE64 secret set; release will be debug-signed."
          fi

      - name: Build release APK
        env:
          FOGWALK_KEYSTORE: ${{ steps.keystore.outputs.keystore_path }}
          FOGWALK_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FOGWALK_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FOGWALK_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FOGWALK_VERSION_CODE: ${{ github.run_number }}
          FOGWALK_VERSION_NAME: 1.0.${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/fogwalk-${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogwalk-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FogWalk v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: dist/*.apk
